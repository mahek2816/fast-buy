<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Address | FASTBUY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f6f7f9;
    font-family:'Segoe UI',sans-serif;
}
.navbar{
    background:#a33b5d;
}
.settings-wrapper{
    max-width:1100px;
    margin:45px auto;
}
.settings-card{
    background:#fff;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    overflow:hidden;
}
.settings-left{
    background:#fafafa;
    padding:30px;
    border-right:1px solid #eee;
}
.user-box h5{
    font-weight:700;
}
.settings-menu a{
    display:flex;
    align-items:center;
    padding:12px 16px;
    margin-bottom:6px;
    border-radius:10px;
    color:#333;
    text-decoration:none;
    font-weight:500;
    transition:.25s;
}
.settings-menu a i{
    margin-right:12px;
    color:#a33b5d;
}
.settings-menu a.active,
.settings-menu a:hover{
    background:#f2e6eb;
    color:#a33b5d;
}
.settings-right{
    padding:35px;
}
.section-title{
    font-weight:700;
    margin-bottom:22px;
    font-size:1.05rem;
}
.form-control{
    border-radius:10px;
}
.form-control:focus{
    border-color:#a33b5d;
    box-shadow:0 0 0 3px rgba(163,59,93,.15);
}
.btn-main{
    background:#a33b5d;
    color:#fff;
    border-radius:22px;
    padding:8px 25px;
    font-weight:600;
}
.btn-main:hover{
    background:#7e2d47;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" width="45">
        <span class="ms-2 fw-bold">FASTBUY</span>
    </a>
    <div class="ms-auto">
        <a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm me-2">Dashboard</a>
        <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">Logout</a>
    </div>
</div>
</nav>

<div class="settings-wrapper">
<div class="settings-card">
<div class="row g-0">

    <!-- LEFT PANEL -->
    <div class="col-md-4 settings-left">
        <div class="user-box mb-4">
            <h5>{{ user.name }}</h5>
            <p>{{ user.email }}</p>
        </div>

        <div class="settings-menu">
            <a href="{{ url_for('profile') }}"><i class="bi bi-person"></i> Profile</a>
            <a href="{{ url_for('security') }}"><i class="bi bi-shield-lock"></i> Security</a>
            <a href="{{ url_for('orders') }}"><i class="bi bi-bag"></i> Orders</a>
            <a class="active"><i class="bi bi-geo-alt"></i> Addresses</a>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="col-md-8 settings-right">

        <div class="section-title">Add New Address</div>

        <form method="POST" action="{{ url_for('add_address') }}">

            <div class="mb-3">
                <label class="fw-semibold">Full Name</label>
                <input type="text" name="fullname" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="fw-semibold">Phone</label>
                <input type="text" name="phone" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="fw-semibold">Address</label>
                <textarea name="address" class="form-control" rows="3" required></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="fw-semibold">City</label>
                    <input type="text" name="city" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="fw-semibold">Pincode</label>
                    <input type="text" name="pincode" class="form-control" required>
                </div>
            </div>

            <div class="text-end">
                <a href="{{ url_for('addresses') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-main">
                    <i class="bi bi-save"></i> Save Address
                </button>
            </div>

        </form>

    </div>

</div>
</div>
</div>

</body>
</html>
