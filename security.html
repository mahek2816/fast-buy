<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Security | FASTBUY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f6f7f9;
    font-family:'Segoe UI',sans-serif;
}

/* Navbar */
.navbar{
    background:#a33b5d;
}
.navbar img{
    border-radius:50%;
    border:2px solid #fff;
}

/* Page wrapper */
.settings-wrapper{
    max-width:1100px;
    margin:45px auto;
}

/* Main card */
.settings-card{
    background:#fff;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    overflow:hidden;
}

/* Left panel */
.settings-left{
    background:#fafafa;
    padding:30px;
    border-right:1px solid #eee;
}
.user-box h5{
    font-weight:700;
    margin-bottom:4px;
}
.user-box p{
    font-size:.9rem;
    color:#777;
}

/* Menu */
.settings-menu a{
    display:flex;
    align-items:center;
    padding:12px 16px;
    margin-bottom:6px;
    border-radius:10px;
    color:#333;
    text-decoration:none;
    font-weight:500;
    transition:.25s;
}
.settings-menu a i{
    margin-right:12px;
    color:#a33b5d;
}
.settings-menu a.active,
.settings-menu a:hover{
    background:#f2e6eb;
    color:#a33b5d;
}

/* Right panel */
.settings-right{
    padding:35px;
}

/* Section title */
.section-title{
    font-weight:700;
    margin-bottom:22px;
    font-size:1.05rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* Form */
.form-control{
    border-radius:10px;
    padding:10px 14px;
}
.form-control:focus{
    border-color:#a33b5d;
    box-shadow:0 0 0 3px rgba(163,59,93,.15);
}

/* Buttons */
.btn-main{
    background:#a33b5d;
    color:#fff;
    border-radius:22px;
    padding:8px 30px;
    font-weight:600;
}
.btn-main:hover{
    background:#7e2d47;
}

/* Info rows */
.info-row{
    display:flex;
    justify-content:space-between;
    padding:14px 0;
    border-bottom:1px solid #eee;
}
.info-row span:last-child{
    font-weight:600;
}

/* Toggle switch */
.form-switch .form-check-input:checked{
    background-color:#a33b5d;
    border-color:#a33b5d;
}

/* Responsive */
@media(max-width:768px){
    .settings-left{
        border-right:none;
        border-bottom:1px solid #eee;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" width="45">
        <span class="ms-2 fw-bold">FASTBUY</span>
    </a>
    <div class="ms-auto">
        <a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm me-2">Dashboard</a>
        <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">Logout</a>
    </div>
</div>
</nav>

<div class="settings-wrapper">
<div class="settings-card">
<div class="row g-0">

    <!-- LEFT PANEL -->
    <div class="col-md-4 settings-left">
        <div class="user-box mb-4">
            <h5>{{ user.name }}</h5>
            <p>{{ user.email }}</p>
        </div>

        <div class="settings-menu">
            <a href="{{ url_for('profile') }}"><i class="bi bi-person"></i> Profile</a>
            <a class="active"><i class="bi bi-shield-lock"></i> Security</a>
            <a href="{{ url_for('orders') }}"><i class="bi bi-bag"></i> Orders</a>
            <a href="{{ url_for('addresses') }}"><i class="bi bi-geo-alt"></i> Addresses</a>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="col-md-8 settings-right">

        <div class="section-title">Change Password</div>
        <form method="POST">
            <div class="mb-3">
                <label class="fw-semibold">Current Password</label>
                <input type="password" name="current_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="fw-semibold">New Password</label>
                <input type="password" name="new_password" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="fw-semibold">Confirm New Password</label>
                <input type="password" name="confirm_password" class="form-control" required>
            </div>
            <div class="text-end mb-4">
                <button class="btn btn-main"><i class="bi bi-key-fill"></i> Update Password</button>
            </div>
        </form>

        <hr class="my-4">

        <div class="section-title">Two-Factor Authentication</div>
        <div class="form-check form-switch mb-4">
            <input class="form-check-input" type="checkbox" id="twoFA">
            <label class="form-check-label fw-semibold" for="twoFA">Enable Two-Factor Authentication</label>
        </div>

        <hr class="my-4">

        <div class="section-title">Login Activity</div>
        <div class="info-row">
            <span>Last Login</span>
            <span>Jan 10, 2026 | 10:15 AM</span>
        </div>
        <div class="info-row">
            <span>Active Sessions</span>
            <span>1 Device</span>
        </div>

    </div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
