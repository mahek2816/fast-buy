<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FASTBUY - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        :root {
            --primary:#a33b5d;
            --accent:#D495A1;
            --bg:#F8F4EE;
            --dark:#2A2A2A;
            --white:#ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--dark);
        }

        /* NAVBAR */
        .navbar {
            background: var(--primary);
        }
        .navbar-brand, .navbar a {
            color: var(--white) !important;
        }
        .navbar-brand img {
            height: 40px;
            width: 40px;
            border-radius: 50%;
            margin-right: 10px;
        }

        /* LOGIN SECTION */
        .login-wrapper {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 18px;
            padding: 30px;
            box-shadow: 0 15px 35px rgba(163,59,93,0.15);
            border: 1px solid rgba(212,149,161,.4);
        }

        .login-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .login-header img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            padding: 4px;
            margin-bottom: 10px;
        }

        .login-header h3 {
            color: var(--primary);
            font-weight: 700;
        }

        .login-header p {
            font-size: .9rem;
            color: #666;
        }

        /* INPUTS */
        .form-control {
            padding: 12px 14px 12px 42px;
            border-radius: 10px;
            border: 1.8px solid #eee;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(163,59,93,.15);
        }

        .input-group-text {
            background: none;
            border: none;
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        .input-group {
            position: relative;
            margin-bottom: 16px;
        }

        /* BUTTON */
        .btn-main {
            width: 100%;
            background: var(--primary);
            color: var(--white);
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
        }

        .btn-main:hover {
            background: #7e2d47;
        }

        /* LINKS */
        .login-footer {
            text-align: center;
            margin-top: 15px;
            font-size: .9rem;
        }

        .login-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="static/images/logo.jpg" alt="Logo">
            FASTBUY
        </a>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm me-2">Home</a>
            <a href="/register" class="btn btn-light btn-sm">Register</a>
        </div>
    </div>
</nav>

<!-- LOGIN FORM -->
<section class="login-wrapper">
    <div class="login-card">

        <div class="login-header">
            <img src="static/images/logo.jpg">
            <h3>Welcome Back</h3>
            <p>Login to continue shopping</p>
        </div>

        <form method="POST">

    <div class="input-group">
        <span class="input-group-text">
            <i class="bi bi-envelope"></i>
        </span>
        <input type="email" name="email" class="form-control" placeholder="Email Address" required>
    </div>

    <div class="input-group">
        <span class="input-group-text">
            <i class="bi bi-lock"></i>
        </span>
        <input type="password" name="password" id="password" class="form-control" placeholder="Password" required>
    </div>

    <button type="submit" class="btn-main">Login</button>

    <div class="login-footer">
        Don’t have an account? <a href="/register">Create Account</a>
    </div>

</form>

    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
