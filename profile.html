<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Account Settings | FASTBUY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
    background:#f6f7f9;
    font-family:'Segoe UI',sans-serif;
}

/* Navbar */
.navbar{
    background:#a33b5d;
}
.navbar img{
    border-radius:40%;
    border:2px solid #fff;
}

/* Page wrapper */
.settings-wrapper{
    max-width:1100px;
    margin:45px auto;
}

/* Main card */
.settings-card{
    background:#fff;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    overflow:hidden;
}

/* Left panel */
.settings-left{
    background:#fafafa;
    padding:30px;
    border-right:1px solid #eee;
}
.user-box h5{
    font-weight:700;
    margin-bottom:4px;
}
.user-box p{
    font-size:.9rem;
    color:#777;
}

/* Menu */
.settings-menu a{
    display:flex;
    align-items:center;
    padding:12px 16px;
    margin-bottom:6px;
    border-radius:10px;
    color:#333;
    text-decoration:none;
    font-weight:500;
    transition:.25s;
}
.settings-menu a i{
    margin-right:12px;
    color:#a33b5d;
}
.settings-menu a.active,
.settings-menu a:hover{
    background:#f2e6eb;
    color:#a33b5d;
}

/* Right panel */
.settings-right{
    padding:35px;
}

/* Section title */
.section-title{
    font-weight:700;
    margin-bottom:22px;
    font-size:1.05rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* Form */
.form-control{
    border-radius:10px;
    padding:10px 14px;
}
.form-control:focus{
    border-color:#a33b5d;
    box-shadow:0 0 0 3px rgba(163,59,93,.15);
}

/* Save button */
.btn-main{
    background:#a33b5d;
    color:#fff;
    border-radius:22px;
    padding:8px 30px;
    font-weight:600;
}
.btn-main:hover{
    background:#7e2d47;
}

/* Info rows */
.info-row{
    display:flex;
    justify-content:space-between;
    padding:14px 0;
    border-bottom:1px solid #eee;
}
.info-row span:last-child{
    font-weight:600;
}

/* Live Preview */
.live-preview{
    background:#f9f2f5;
    border-radius:12px;
    padding:15px 20px;
    margin-bottom:20px;
}
.live-preview h5{
    font-weight:700;
    margin-bottom:4px;
}
.live-preview p{
    font-size:.9rem;
    color:#555;
}

/* Responsive */
@media(max-width:768px){
    .settings-left{
        border-right:none;
        border-bottom:1px solid #eee;
    }
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
    <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='images/logo.jpg') }}" width="45">
        <span class="ms-2 fw-bold">FASTBUY</span>
    </a>
    <div class="ms-auto">
        <a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm me-2">Dashboard</a>
        <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">Logout</a>
    </div>
</div>
</nav>

<div class="settings-wrapper">
<div class="settings-card">
<div class="row g-0">

    <!-- LEFT PANEL -->
    <div class="col-md-4 settings-left">
        <div class="user-box mb-4">
            <h5 id="previewName">{{ user.name }}</h5>
            <p id="previewEmail">{{ user.email }}</p>
        </div>

        <div class="settings-menu">
            <a class="active"><i class="bi bi-person"></i> Profile</a>
            <a href="{{ url_for('security') }}"><i class="bi bi-shield-lock"></i> Security</a>
            <a href="{{ url_for('orders') }}"><i class="bi bi-bag"></i> Orders</a>
            <a href="#"><i class="bi bi-geo-alt"></i> Addresses</a>
        </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="col-md-8 settings-right">

        <!-- Profile Information -->
        <div class="section-title">
    Profile Information
    <button type="button" class="btn btn-outline-secondary btn-sm" id="editBtn">
        <i class="bi bi-pencil"></i> Edit Profile
    </button>
</div>

<div class="info-row">
    <span>Account Status</span>
    <span class="text-success">Active</span>
</div>
<div class="info-row">
    <span>Member Since</span>
   <span>{{ member_since }} (Active for {{ years_active }} years)</span>
</div>
<div class="info-row">
    <span>Current Time</span>
    <span>{{ current_time }}</span>
</div>

        <hr class="my-4">

        <!-- Edit Profile Form -->
        <div class="section-title">Edit Details</div>

        <form method="POST" id="profileForm">

            <div class="mb-3">
                <label class="fw-semibold">Full Name</label>
                <input type="text" name="name" class="form-control"
                       value="{{ user.name }}" disabled required>
            </div>

            <div class="mb-3">
                <label class="fw-semibold">Email</label>
                <input type="email" class="form-control"
                       value="{{ user.email }}" disabled>
            </div>

            <div class="mb-3">
                <label class="fw-semibold">Change Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Leave blank to keep same" disabled>
            </div>

            <div class="text-end d-none" id="actionButtons">
                <button type="button" class="btn btn-light me-2" id="cancelBtn">Cancel</button>
                <button class="btn btn-main" type="submit"><i class="bi bi-save"></i> Save Changes</button>
            </div>

        </form>

    </div>

</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Edit Profile Toggle
const editBtn = document.getElementById("editBtn");
const cancelBtn = document.getElementById("cancelBtn");
const actionButtons = document.getElementById("actionButtons");
const inputs = document.querySelectorAll("#profileForm input");

// Sidebar preview
const previewName = document.getElementById("previewName");
const previewEmail = document.getElementById("previewEmail");

let originalName = previewName.textContent;
let originalPassword = ""; // password is blank

editBtn.addEventListener("click", () => {
    inputs.forEach(input => input.disabled = false);
    actionButtons.classList.remove("d-none");
    editBtn.classList.add("d-none");
});

// Cancel changes
cancelBtn.addEventListener("click", () => {
    inputs.forEach(input => {
        if(input.name === "name") input.value = originalName;
        if(input.name === "password") input.value = originalPassword;
        input.disabled = true;
    });
    previewName.textContent = originalName;
    actionButtons.classList.add("d-none");
    editBtn.classList.remove("d-none");
});

// Live preview of name
inputs.forEach(input => {
    input.addEventListener("input", () => {
        if(input.name === "name") previewName.textContent = input.value;
    });
});
</script>

</body>
</html>
