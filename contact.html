<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | FASTBUY</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(145deg, #FFF5F2, #FFEFF5);
    font-family: 'Segoe UI', sans-serif;
}

/* ===== NAVBAR SAME AS DASHBOARD ===== */
.navbar {
    background: #A33B5D;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    padding: 0.8rem 1rem;
}

.navbar-brand img {
    border-radius: 50%;
    border: 2px solid #fff;
    transition: transform 0.3s;
}

.navbar-brand img:hover {
    transform: scale(1.1);
}

.navbar .nav-link {
    color: #fff !important;
    position: relative;
    font-weight: 600;
    padding: 8px 14px;
    transition: all 0.3s ease;
}

/* underline animation */
.navbar .nav-link::after {
    content: "";
    position: absolute;
    left: 50%;
    bottom: 4px;
    width: 0;
    height: 2px;
    background: #FFD6E0;
    transition: all 0.3s ease;
    transform: translateX(-50%);
}

.navbar .nav-link:hover::after {
    width: 70%;
}

/* hover lift */
.nav-animate {
    transition: transform 0.3s ease;
}

.nav-animate:hover {
    transform: translateY(-2px);
}

/* welcome text */
.welcome-text {
    font-weight: 600;
    color: #fff;
}

/* logout */
.nav-logout {
    color: #FFD6E0 !important;
}

.nav-logout:hover {
    color: #FFB3C1 !important;
}

.nav-logout i {
    transition: transform 0.3s ease;
}

.nav-logout:hover i {
    transform: translateX(3px);
}

.contact-card {
    max-width: 900px;
    margin: 70px auto;
    background: #fff;
    border-radius: 25px;
    padding: 40px;
    box-shadow: 0 15px 40px rgba(163,59,93,0.15);
}

.contact-card h2 {
    color: #A33B5D;
    font-weight: 800;
}

.form-control {
    border-radius: 15px;
}

.btn-send {
    background: #A33B5D;
    color: #fff;
    border-radius: 25px;
    padding: 10px 30px;
    font-weight: 600;
}
.btn-send:hover {
    background: #7E2D47;
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
            <img src="{{ url_for('static', filename='images/logo.jpg') }}" width="50" height="50" alt="FASTBUY">
            <span class="ms-2 fw-bold">FASTBUY</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDashboard">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNavDashboard">
            <ul class="navbar-nav ms-auto align-items-center">

                <!-- Welcome -->
                <li class="nav-item me-3">
                    <span class="nav-link welcome-text">Welcome, {{ username }}</span>
                </li>

                <!-- Dashboard -->
                <li class="nav-item nav-animate">
                    <a class="nav-link fw-semibold" href="{{ url_for('dashboard') }}">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                </li>

                <!-- About -->
                <li class="nav-item nav-animate">
                    <a class="nav-link fw-semibold" href="{{ url_for('about') }}">
                        <i class="bi bi-info-circle me-1"></i> About Us
                    </a>
                </li>

                <!-- Contact -->
                <li class="nav-item nav-animate">
                    <a class="nav-link fw-semibold" href="{{ url_for('contact') }}">
                        <i class="bi bi-telephone me-1"></i> Contact Us
                    </a>
                </li>

                <!-- Logout -->
                <li class="nav-item">
                    <a class="nav-link nav-logout" href="{{ url_for('logout') }}">
                        <i class="bi bi-box-arrow-right me-1"></i> Logout
                    </a>
                </li>

            </ul>
        </div>
    </div>
</nav>


<!-- CONTACT FORM -->
<div class="contact-card">
    <h2>Contact Us</h2>
    <p class="text-muted mb-4">Have questions? We’d love to hear from you.</p>

    <form>
        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Your Name" required>
            </div>
            <div class="col-md-6">
                <input type="email" class="form-control" placeholder="Your Email" required>
            </div>
            <div class="col-12">
                <textarea class="form-control" rows="5" placeholder="Your Message"></textarea>
            </div>
            <div class="col-12 text-center mt-3">
                <button class="btn btn-send">Send Message</button>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
