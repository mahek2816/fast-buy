<!-- templates/admin_edit_user.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User | FASTBUY Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sidebar { width: 250px; position: fixed; top: 0; left: 0; height: 100%; background: #343a40; padding-top: 60px; }
        .sidebar a { color: #fff; display: block; padding: 15px; text-decoration: none; }
        .sidebar a:hover { background: #495057; }
        .content { margin-left: 260px; padding: 20px; }
        .form-label { font-weight: 500; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <h4 class="text-center text-white">Admin Panel</h4>
    <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
    <a href="{{ url_for('admin_users') }}">Users</a>
    <a href="{{ url_for('admin_orders') }}">Orders</a>
    <a href="{{ url_for('admin_products') }}">Products</a>
    <a href="{{ url_for('admin_categories') }}">Categories</a>
    <a href="{{ url_for('logout') }}">Logout</a>
</div>

<!-- Main Content -->
<div class="content">
    <h2>Edit User</h2>

    <form method="POST" action="{{ url_for('edit_user', user_id=user.id) }}">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" name="name" value="{{ user.name }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ user.email }}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" name="role" required>
                <option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option>
                <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Update User</button>
        <a href="{{ url_for('admin_users') }}" class="btn btn-secondary">Cancel</a>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
