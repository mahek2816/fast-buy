<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order #{{ order.id }} | FASTBUY</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
<style>
body { background:#f6f7f9; font-family:'Segoe UI',sans-serif; }
.navbar{ background:#a33b5d; }
.navbar a { color:#fff; }
.order-card{ background:#fff; padding:25px; border-radius:15px; box-shadow:0 10px 30px rgba(0,0,0,.08); }
.product-image{ width:180px; border-radius:10px; border:1px solid #eee; }
.status{ padding:5px 15px; border-radius:20px; font-weight:600; font-size:.85rem; }
.status-Delivered{ background:#e7f6ec; color:#198754; }
.status-Pending{ background:#fff3cd; color:#856404; }
.status-Cancelled{ background:#fdecea; color:#dc3545; }
.btn-main{ background:#a33b5d; color:#fff; border-radius:20px; padding:8px 22px; }
.btn-main:hover{ background:#7e2d47; color:#fff; }
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
    <a class="navbar-brand fw-bold" href="{{ url_for('dashboard') }}">FASTBUY</a>
    <div class="ms-auto">
        <a href="{{ url_for('orders') }}" class="btn btn-light btn-sm me-2">My Orders</a>
        <a href="{{ url_for('logout') }}" class="btn btn-light btn-sm">Logout</a>
    </div>
</div>
</nav>

<div class="container mt-5">
    <div class="order-card row g-3">
        <!-- Product Image -->
        <div class="col-md-4 text-center">
            {% if order.product_image %}
            <img src="{{ url_for('static', filename='products/' + order.product_image) }}" class="product-image" alt="Product">
            {% else %}
           <img src="{{ url_for('static', filename='images/logo.jpg') }}" width="45">
        <span class="ms-2 fw-bold">FASTBUY</span>
            {% endif %}
        </div>

        <!-- Order Details -->
        <div class="col-md-8">
            <h4>Order #{{ order.id }}</h4>
            <p>Status: <span class="status status-{{ order.status }}">{{ order.status }}</span></p>
            <p><strong>Product:</strong> {{ order.product_name }}</p>
            <p><strong>Quantity:</strong> {{ order.quantity }}</p>
            <p><strong>Total:</strong> ₹ {{ order.price }}</p>
            <p><strong>Ordered on:</strong> {{ order.created_at }}</p>

            <div class="mt-3">
                <a href="{{ url_for('orders') }}" class="btn btn-secondary btn-sm me-2"><i class="bi bi-arrow-left"></i> Back to Orders</a>
                <a href="{{ url_for('invoice', order_id=order.id) }}" class="btn btn-main btn-sm"><i class="bi bi-receipt"></i> View Invoice</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
