<!DOCTYPE html>
<html>
<head>
    <title>{{ category }} | FastBuy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-4">

    <h4 class="fw-bold mb-3">{{ category }}</h4>

    <div class="row g-3">
        {% for product in products %}
        <div class="col-md-3">
            <div class="card h-100 shadow-sm">
                <img src="{{ url_for('static', filename='products/' ~ product.image) }}"
                     class="card-img-top"
                     onerror="this.src='{{ url_for('static', filename='products/default.png') }}'">

                <div class="card-body">
                    <h6 class="fw-bold">{{ product.name }}</h6>
                    <p class="text-muted mb-1">₹{{ product.price }}</p>

                    <form method="post" action="{{ url_for('place_order') }}">
                        <input type="hidden" name="product_name" value="{{ product.name }}">
                        <input type="hidden" name="price" value="{{ product.price }}">
                        <input type="hidden" name="quantity" value="1">
                        <button class="btn btn-sm btn-primary w-100">Add to Cart</button>
                    </form>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-muted">No products found</p>
        {% endfor %}
    </div>

</div>

</body>
</html>
