<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}FASTBUY{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background:#a33b5d;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
            <img src="{{ url_for('static', filename='images/logo.jpg') }}" 
     alt="FASTBUY Logo"
     style="width:45px; height:45px; border-radius:50%; object-fit:cover; border:2px solid #fff;">

            <span class="ms-2 fw-bold">FASTBUY</span>
        </a>
    </div>
</nav>

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
